      summary: Upload files to AWS S3
      operationId: uploadFiles
      description: |
        Generic file upload endpoint. Files are stored in AWS S3 under the specified folder prefix.
        Accepted types: SVG, PNG, JPG, PDF. Max 10 MB per file.
      parameters:
        - name: folder
          in: query
          schema:
            type: string
            default: general
          description: "S3 key prefix (e.g. events/covers, reviews/photos, support/evidence)"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Upload results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_UploadResultList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: File upload not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Webhooks ────────────────────────────────
  /webhooks/payment:
    post:
      tags: [Webhooks]
      summary: Razorpay payment webhook receiver
      operationId: razorpayPaymentWebhook
      description: |
        Called by Razorpay when a payment is captured or fails.
        Acts as a server-side fallback to credit the wallet even if the
        client-side verify call was missed. Signature is verified via HMAC-SHA256.
      parameters:
        - name: X-Razorpay-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RazorpayPaymentWebhookEvent"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /webhooks/payout:
    post:
      tags: [Webhooks]
      summary: Cashfree payout webhook receiver
      operationId: cashfreePayoutWebhook
      description: |
        Called by Cashfree when a payout/transfer status changes.
        The webhook signature header is verified using HMAC-SHA256.
      parameters:
        - name: x-webhook-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CashfreePayoutWebhookEvent"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────
components:
  # ── Security Schemes ───────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: "Firebase ID token passed as `Authorization: Bearer <token>`. Admin endpoints additionally require the token's email to match the `ADMIN_EMAIL` env variable."

  # ── Parameters ──────────────────────────────
  parameters:
    HostIDPath:
      name: hostID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Host UUID

    BookingIDPath:
      name: bookingID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Booking UUID

    EventIDPath:
      name: eventID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Event UUID

    UserIDPath:
      name: userID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User UUID

    MethodIDPath:
      name: methodID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Payout method UUID

    TicketIDPath:
      name: ticketID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Support ticket UUID

    MessageIDPath:
      name: messageID
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Inbox message UUID

  # ── Reusable Responses ─────────────────────
  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ── Schemas ─────────────────────────────────
  schemas:
    # ── Envelope ──────────────────────────────
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string

    # ── Request Bodies ────────────────────────
    UserSignUpRequest:
      type: object
      required: [auth_uid, email, name, phn_number]
      properties:
        auth_uid:
          type: string
          description: Firebase Auth UID
          example: "firebase_uid_abc123"
        email:
          type: string
          format: email
          example: "user@example.com"
        name:
          type: string
          example: "Ankit Sharma"
        phn_number:
          type: string
          example: "+919876543210"

    UserProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        city:
          type: string
          nullable: true

    InitiateAadharRequest:
      type: object
      required: [user_id, aadhar_number]
      properties:
        user_id:
          type: string
          format: uuid
        aadhar_number:
          type: string
          example: "123456789012"

    CompleteAadharRequest:
      type: object
      required: [user_id, transaction_id, otp]
      properties:
        user_id:
          type: string
          format: uuid
        transaction_id:
          type: string
        otp:
          type: string
          example: "123456"

    SaveExperienceRequest:
      type: object
      required: [user_id, event_id]
      properties:
        user_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid

    TopUpRequest:
      type: object
      required: [user_id, amount_cents]
      properties:
        user_id:
          type: string
          format: uuid
        amount_cents:
          type: integer
          format: int64
          description: Amount to add in paise (INR cents), must be positive
          example: 50000
        idempotency_key:
          type: string
          description: Optional idempotency key to prevent duplicate orders

    TopUpOrderResponse:
      type: object
      description: Returned after creating a Razorpay order. Use these fields to launch checkout.
      properties:
        order_id:
          type: string
          description: Razorpay order ID (order_xxxxx)
          example: order_EKm05ESALkpH5f
        amount_cents:
          type: integer
          format: int64
          description: Amount in paise
          example: 50000
        currency:
          type: string
          example: INR
        key_id:
          type: string
          description: Razorpay public key for client-side checkout SDK
          example: rzp_live_xxxxxxx
        payment_id:
          type: string
          format: uuid
          description: Internal payment UUID for tracking

    VerifyTopUpRequest:
      type: object
      required: [user_id, razorpay_order_id, razorpay_payment_id, razorpay_signature]
      properties:
        user_id:
          type: string
          format: uuid
        razorpay_order_id:
          type: string
          description: From Razorpay checkout callback
          example: order_EKm05ESALkpH5f
        razorpay_payment_id:
          type: string
          description: From Razorpay checkout callback
          example: pay_EKm05ESALkpH5f
        razorpay_signature:
          type: string
          description: HMAC-SHA256 signature from Razorpay checkout callback

    RazorpayPaymentWebhookEvent:
      type: object
      description: Razorpay payment webhook payload (payment.captured / payment.failed)
      properties:
        entity:
          type: string
          example: event
        account_id:
          type: string
        event:
          type: string
          example: payment.captured
        payload:
          type: object
          properties:
            payment:
              type: object
              properties:
                entity:
                  type: object
                  properties:
                    id:
                      type: string
                      example: pay_EKm05ESALkpH5f
                    order_id:
                      type: string
                      example: order_EKm05ESALkpH5f
                    amount:
                      type: integer
                      format: int64
                    status:
                      type: string
                      enum: [captured, failed]
        created_at:
          type: integer
          format: int64

    WalletBalance:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        balance_cents:
          type: integer
          format: int64
          example: 150000

    PlatformBalance:
      type: object
      description: Platform account containing all collected fees from bookings
      properties:
        account_id:
          type: string
          format: uuid
        balance_cents:
          type: integer
          format: int64
          description: Total collected fees in paise (INR cents)
          example: 45000
        collected_from_bookings:
          type: integer
          format: int64
          description: Total amount collected from all bookings (15% of each)
          example: 45000

