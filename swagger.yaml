  # ── Support ─────────────────────────────────
  /support/:
    post:
      tags: [Support]
      summary: Create a support ticket (JSON or multipart with evidence)
      operationId: createSupportTicket
      description: |
        Accepts both `application/json` and `multipart/form-data`.
        For multipart, use form fields: `user_id`, `category`, `subject`, `message`,
        `reported_user_id`, `event_id`, `session_date`, `report_reason`, `is_urgent`,
        and file field `evidence` (multiple files allowed, uploaded to S3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketRequest"
          multipart/form-data:
            schema:
              type: object
              required: [user_id, category, subject, message]
              properties:
                user_id:
                  type: string
                  format: uuid
                category:
                  $ref: "#/components/schemas/SupportCategory"
                subject:
                  type: string
                message:
                  type: string
                reported_user_id:
                  type: string
                  format: uuid
                event_id:
                  type: string
                  format: uuid
                session_date:
                  type: string
                  format: date-time
                report_reason:
                  $ref: "#/components/schemas/ReportReason"
                is_urgent:
                  type: string
                  enum: ["true", "false"]
                evidence:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SupportTicket"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /support/{ticketID}:
    get:
      tags: [Support]
      summary: Get a support ticket by ID
      operationId: getSupportTicket
      parameters:
        - $ref: "#/components/parameters/TicketIDPath"
      responses:
        "200":
          description: Support ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SupportTicket"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /support/user/{userID}:
