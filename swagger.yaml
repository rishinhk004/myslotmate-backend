openapi: "3.0.3"
info:
  title: MySlotMate API
  description: |
    Backend API for **MySlotMate** – a slot-booking platform with wallet-based payments,
    Cashfree payouts, Aadhar (Setu OKYC) verification, AWS S3 file uploads,
    and real-time inbox messaging.

    Every response follows the standard envelope:
    ```json
    { "success": true|false, "data": ..., "message": "...", "error": "..." }
    ```
  version: "2.0.0"

servers:
  - url: http://localhost:{port}
    description: Local development
    variables:
      port:
        default: "8080"

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: User sign-up & Aadhar verification
  - name: Users
    description: User profile management
  - name: SavedExperiences
    description: Bookmark/unsave experiences
  - name: Hosts
    description: Host application, profile & dashboard
  - name: Events
    description: Event (experience) CRUD, publish/pause/resume, calendar
  - name: Bookings
    description: Booking lifecycle (create → confirm → cancel)
  - name: Payouts
    description: Payout methods, withdrawal, earnings & history
  - name: Reviews
    description: Event reviews with ratings & photos
  - name: Inbox
    description: Multi-party messaging (host/guest/system)
  - name: Support
    description: Support tickets & report-a-participant
  - name: Upload
    description: Generic file upload (AWS S3)
  - name: Webhooks
    description: Cashfree payout + Razorpay payment webhook receivers
  - name: Admin
    description: Admin-only host application management (requires ADMIN_EMAIL)

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────
paths:
  # ── Health ──────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Server is healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok

  # ── Auth ────────────────────────────────────
  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: signUp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSignUpRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/verify-aadhar/init:
    post:
      tags: [Auth]
      summary: Initiate Aadhar OKYC verification
      operationId: initiateAadhar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateAadharRequest"
      responses:
        "200":
          description: OTP sent — returns transaction ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_AadharInit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/verify-aadhar/complete:
    post:
      tags: [Auth]
      summary: Complete Aadhar verification with OTP
      operationId: completeAadhar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteAadharRequest"
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Users ───────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get own user profile
      operationId: getMyProfile
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Users]
      summary: Update own profile
      operationId: updateProfile
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Saved Experiences ───────────────────────
  /users/wallet/balance:
    get:
      tags: [Users]
      summary: Get wallet balance
      operationId: getWalletBalance
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_WalletBalance"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/wallet/topup:
    post:
      tags: [Users]
      summary: Initiate wallet top-up (creates Razorpay order)
      operationId: initiateTopUp
      description: |
        Creates a Razorpay order for the given amount. Returns `order_id` and `key_id`
        that the client uses to launch the Razorpay Checkout SDK. After the user
        completes payment, call `/users/wallet/topup/verify` with the Razorpay callback data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpRequest"
      responses:
        "201":
          description: Razorpay order created — use these fields to launch checkout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_TopUpOrder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/wallet/topup/verify:
    post:
      tags: [Users]
      summary: Verify top-up payment and credit wallet
      operationId: verifyTopUp
      description: |
        Called by the client after Razorpay Checkout completes successfully.
        Verifies the Razorpay signature, credits the wallet, and returns the updated balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTopUpRequest"
      responses:
        "200":
          description: Payment verified, wallet credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_WalletBalance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid Razorpay signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/saved-experiences:
    post:
      tags: [SavedExperiences]
      summary: Save/bookmark an experience
      operationId: saveExperience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveExperienceRequest"
      responses:
        "201":
          description: Experience saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SavedExperience"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [SavedExperiences]
      summary: List all saved experiences
      operationId: getSavedExperiences
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Array of saved experiences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_SavedExperienceList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/saved-experiences/{eventID}:
    delete:
      tags: [SavedExperiences]
      summary: Remove a saved experience
      operationId: unsaveExperience
      parameters:
        - $ref: "#/components/parameters/EventIDPath"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Experience unsaved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/saved-experiences/{eventID}/check:
    get:
      tags: [SavedExperiences]
      summary: Check if an event is saved
      operationId: isExperienceSaved
      parameters:
        - $ref: "#/components/parameters/EventIDPath"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Returns { saved: true/false }"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      saved:
                        type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Hosts ───────────────────────────────────
  /hosts:
    get:
      tags: [Hosts]
      summary: List all approved hosts (public)
      operationId: listHosts
      responses:
        "200":
          description: List of approved host profiles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_PublicHostProfileList"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/{hostID}:
    get:
      tags: [Hosts]
      summary: View a host's public profile
      operationId: getPublicHostProfile
      parameters:
        - name: hostID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Public host profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_PublicHostProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/apply:
    post:
      tags: [Hosts]
      summary: Submit host application (status → pending)
      operationId: submitHostApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostApplicationRequest"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/apply/draft:
    post:
      tags: [Hosts]
      summary: Save host application as draft
      operationId: saveHostDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostApplicationRequest"
      responses:
        "201":
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/application-status:
    get:
      tags: [Hosts]
      summary: Check own application status
      operationId: getApplicationStatus
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/me:
    get:
      tags: [Hosts]
      summary: Get own host profile
      operationId: getMyHost
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Host profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Hosts]
      summary: Update own host profile
      operationId: updateHostProfile
      parameters:
        - name: host_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostProfileUpdateRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/dashboard:
    get:
      tags: [Hosts]
      summary: Get host dashboard overview
      operationId: getHostDashboard
      parameters:
        - name: host_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard data (earnings, ratings, stats)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_HostDashboard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/me/social:
    put:
      tags: [Hosts]
      summary: Connect a social media account (submit URL)
      operationId: connectSocial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, platform, url]
              properties:
                user_id:
                  type: string
                  format: uuid
                platform:
                  type: string
                  enum: [instagram, linkedin, website, youtube, twitter]
                url:
                  type: string
                  example: https://instagram.com/myhost
      responses:
        "200":
          description: Social link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/me/social/{platform}:
    delete:
      tags: [Hosts]
      summary: Disconnect a social media account
      operationId: disconnectSocial
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [instagram, linkedin, website, youtube, twitter]
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Social link removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/attention-items:
    get:
      tags: [Hosts]
      summary: Get items needing host attention (cancelled bookings, pending reviews, etc.)
      operationId: getAttentionItems
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attention items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/HostAttentionItems"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /hosts/earnings/breakdown:
    get:
      tags: [Hosts]
      summary: Get per-event earnings breakdown
      operationId: getEarningsBreakdown
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Earnings breakdown by event
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/HostEarningsBreakdown"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Admin (Host Applications) ───────────────
  /admin/hosts/applications:
    get:
      tags: [Admin]
      summary: List all pending host applications
      operationId: listPendingApplications
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of pending host applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_HostList"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/hosts/{hostID}/approve:
    post:
      tags: [Admin]
      summary: Approve a host application (status → approved)
      operationId: approveHostApplication
      security:
        - BearerAuth: []
      parameters:
        - name: hostID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Application approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/hosts/{hostID}/reject:
    post:
      tags: [Admin]
      summary: Reject a host application (status → rejected)
      operationId: rejectHostApplication
      security:
        - BearerAuth: []
      parameters:
        - name: hostID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for rejecting the application
                  example: Insufficient experience description
      responses:
        "200":
          description: Application rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Host"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/platform/balance:
    get:
      tags: [Admin]
      summary: Get platform account balance and fee collection
      description: |
        Returns the total platform fees collected from all bookings.
        The platform automatically collects 15% of every booking amount.
      operationId: getPlatformBalance
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Platform account balance and statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_PlatformBalance"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/platform/payout-methods:
    post:
      tags: [Admin]
      summary: Add a payout method for platform account
      operationId: addAdminPayoutMethod
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [bank, upi]
                bank_name:
                  type: string
                account_type:
                  type: string
                account_number:
                  type: string
                ifsc:
                  type: string
                beneficiary_name:
                  type: string
                upi_id:
                  type: string
      responses:
        "201":
          description: Payout method created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_PayoutMethod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      tags: [Admin]
      summary: List all payout methods for platform account
      operationId: listAdminPayoutMethods
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of payout methods
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_PayoutMethodList"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/platform/payout-methods/{methodID}/primary:
    put:
      tags: [Admin]
      summary: Set a payout method as primary for platform
      operationId: setAdminPrimaryMethod
      security:
        - BearerAuth: []
      parameters:
        - name: methodID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Primary method updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/platform/payout-methods/{methodID}:
    delete:
      tags: [Admin]
      summary: Delete a payout method from platform account
      operationId: deleteAdminPayoutMethod
      security:
        - BearerAuth: []
      parameters:
        - name: methodID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Method deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse_Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unauthorized — missing or invalid token
        "403":
          description: Forbidden — caller is not admin
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/platform/withdraw:
    post:
      tags: [Admin]
      summary: Withdraw platform fees to admin's bank account or UPI
      operationId: requestAdminWithdrawal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents]
              properties:
                amount_cents:
                  type: integer
                  format: int64
                  description: Amount to withdraw in paise (INR cents)
                  example: 50000
                payout_method_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: If not provided, uses primary method
                idempotency_key:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Withdrawal request processed
          content:
            application/json:
              schema:
